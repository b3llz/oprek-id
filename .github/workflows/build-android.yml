
name: Build Android Release (AAB)

# Robot akan jalan secara MANUAL saat kamu pencet tombol
on:
  workflow_dispatch:

jobs:
  build:
    # Server pakai Ubuntu (Linux)
    runs-on: ubuntu-latest

    steps:
      # 1. Mengambil kode kamu dari gudang
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. Menyiapkan bahasa Java (Syarat Android)
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      # 3. Menyiapkan mesin Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2' # Pakai versi stabil terbaru
          channel: 'stable'

      # 4. Mendownload bensin/onderdil (packages)
      - name: Get Dependencies
        run: flutter pub get

      # 5. MERAKIT MOTOR! (Build App Bundle)
      # Catatan: Ini build 'debug' sementara supaya tidak butuh Keystore (Tanda Tangan)
      # Untuk rilis asli Play Store, butuh Keystore. Karena dari iPhone susah bikin Keystore lokal,
      # jalur paling mudah adalah mengandalkan "Google Play App Signing" saat upload nanti,
      # atau kita build FAT APK/AAB dan sign di web pihak ketiga kalau mau ribet.
      # Tapi untuk amannya, kita buat build AAB biasa dulu.
      - name: Build AAB
        run: flutter build appbundle --release

      # 6. Mengirim hasil rakitan ke layar kamu (supaya bisa di-download)
      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: oprek-id-release-aab
          path: build/app/outputs/bundle/release/app-release.aab

